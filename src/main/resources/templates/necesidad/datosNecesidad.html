<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Necesidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-exclamation-circle me-2"></i> Necesidades</h4>
            <p>Gestiona las necesidades detectadas en los grupos de tutoría</p>
        </div>
        <a th:href="@{/necesidad/necesidades/nuevo}" class="btn-nueva"
   sec:authorize="hasAnyRole('ADMINISTRADOR', 'TUTOR')">
    <i class="fas fa-plus me-1"></i> Nueva Necesidad
</a>
    </div>

    <!-- ALERTA -->
    <div th:if="${msg != null}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>

    <!-- TABLA -->
    <div class="tabla-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-align-left me-1"></i> Descripción</th>
                        <th><i class="fas fa-chalkboard-teacher me-1"></i> Tutor</th>
                        <th><i class="fas fa-graduation-cap me-1"></i> Carrera</th>
                        <th><i class="fas fa-calendar-alt me-1"></i> Semestre</th>
                        <th>Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(necesidades)}">
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No hay necesidades registradas</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="tmpNecesidad : ${necesidades}">
                        <td th:text="${tmpNecesidad.idNecesidad}"></td>
                        <td th:text="${tmpNecesidad.descripcion}"></td>
                        <td>
                            <span class="tutor-nombre"
                                  th:text="${tmpNecesidad.asignacion.tutor.nombre + ' ' + tmpNecesidad.asignacion.tutor.apellido}">
                            </span>
                        </td>
                        <td th:text="${tmpNecesidad.asignacion.carrera.nombre}"></td>
                        <td th:text="${tmpNecesidad.asignacion.semestre.nombre}"></td>
                        <td>
                            <div class="acciones">
                                <a th:href="@{/necesidad/ver/{id}(id=${tmpNecesidad.idNecesidad})}"
                                   class="btn-accion btn-ver">
                                    <i class="fas fa-eye"></i> Ver
                                </a>
                               <!-- <a th:href="@{/necesidad/editar/{id}(id=${tmpNecesidad.idNecesidad})}"
                                   class="btn-accion btn-editar">
                                    <i class="fas fa-edit"></i> Editar
                                </a>
                                <a th:href="@{/necesidad/eliminar(id=${tmpNecesidad.idNecesidad})}"
                                   class="btn-accion btn-eliminar">
                                    <i class="fas fa-trash"></i> Eliminar
                                </a>-->
                                <a th:href="@{/necesidad/editar/{id}(id=${tmpNecesidad.idNecesidad})}"
   class="btn-accion btn-editar"
   sec:authorize="hasAnyRole('ADMINISTRADOR', 'TUTOR')">
    <i class="fas fa-edit"></i> Editar
</a>
<a th:href="@{/necesidad/eliminar(id=${tmpNecesidad.idNecesidad})}"
   class="btn-accion btn-eliminar"
   sec:authorize="hasAnyRole('ADMINISTRADOR', 'TUTOR')">
    <i class="fas fa-trash"></i> Eliminar
</a>
                                
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Necesidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4 th:text="${necesidad.idNecesidad != null} ? 'Editar Necesidad' : 'Registrar Necesidad'"></h4>
            <p>Completa los datos para guardar la necesidad detectada</p>
        </div>
        <a th:href="@{/necesidad/necesidades}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
        <div class="card-header-custom">
            <i class="fas fa-exclamation-circle"></i> Datos de la Necesidad
        </div>
        <div class="p-4">
            <form th:action="@{/necesidad/necesidades/guardar}" th:object="${necesidad}" method="post">
                <input type="hidden" th:field="*{idNecesidad}">

                <div class="mb-3">
                    <label class="form-label campo-requerido">Asignación (Tutor - Carrera)</label>
                    <select class="form-select" th:field="*{asignacion.idAsignacion}">
                        <option value="">-- Selecciona una asignación --</option>
                        <option th:each="a : ${asignaciones}"
                                th:value="${a.idAsignacion}"
                                th:text="${a.tutor.nombre + ' ' + a.tutor.apellido + ' — ' + a.carrera.nombre + ' | ' + a.semestre.nombre}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label campo-requerido">Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="4"
                              placeholder="Describe la necesidad detectada..."></textarea>
                </div>

                <!-- Leyenda de campos obligatorios -->
                <p class="text-muted small mt-2">
                    <span style="color: red; font-weight: bold;">*</span> Campos obligatorios
                </p>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <a th:href="@{/necesidad/necesidades}" class="btn-regresar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

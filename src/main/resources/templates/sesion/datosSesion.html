<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sesiones de Tutoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-calendar-alt me-2"></i> Sesiones de Tutoría</h4>
            <p>Gestiona las sesiones registradas por tutores y carreras</p>
        </div>
       <!--  <a th:href="@{/sesion/sesiones/nuevo}" class="btn-nueva">
            <i class="fas fa-plus me-1"></i> Nueva Sesión
        </a>
         -->
         <a th:href="@{/sesion/sesiones/masivo}" class="btn-nueva">
        <i class="fas fa-users me-1"></i> Sesión por Carrera
    </a>
    </div>

    <!-- ALERTA -->
    <div th:if="${msg != null}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>

    <!-- TABLA -->
    <div class="tabla-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th class="text-center"><i class="fas fa-list-ol me-1"></i> Semana</th>
                        <th><i class="fas fa-calendar me-1"></i> Fecha</th>
                        <th><i class="fas fa-chalkboard-teacher me-1"></i> Tutor</th>
                        <th><i class="fas fa-graduation-cap me-1"></i> Carrera</th>
                        <th><i class="fas fa-calendar-alt me-1"></i> Semestre</th>
                        <th>Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(sesiones)}">
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No hay sesiones registradas</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="tmpSesion : ${sesiones}">
                        <td th:text="${tmpSesion.idSesion}"></td>
                        <td class="text-center" th:text="${tmpSesion.semana}"></td>
                        <td th:text="${tmpSesion.fecha}"></td>
                        <td>
                            <span class="tutor-nombre"
                                  th:text="${tmpSesion.asignacion.tutor.nombre + ' ' + tmpSesion.asignacion.tutor.apellido}">
                            </span>
                        </td>
                        <td th:text="${tmpSesion.asignacion.carrera.nombre}"></td>
                        <td th:text="${tmpSesion.asignacion.semestre.nombre}"></td>
                        <td>
                            <div class="acciones">
                                <a th:href="@{/sesion/ver/{id}(id=${tmpSesion.idSesion})}"
                                   class="btn-accion btn-ver">
                                    <i class="fas fa-eye"></i> Ver
                                </a>
                                
                                
                                <a th:href="@{/sesion/editar/{id}(id=${tmpSesion.idSesion})}"
                                   class="btn-accion btn-editar">
                                    <i class="fas fa-edit"></i> Editar
                                </a>
                               <!--   <a th:href="@{/sesion/eliminar(id=${tmpSesion.idSesion})}"
                                   class="btn-accion btn-eliminar">
                                    <i class="fas fa-trash"></i> Eliminar
                                </a>-->
                                <a th:href="@{/sesion/eliminar(id=${tmpSesion.idSesion})}"
   class="btn-accion btn-eliminar"
   onclick="return confirm('¿Estás seguro de que deseas eliminar esta sesión? También se eliminarán todas sus asistencias.')">
    <i class="fas fa-trash"></i> Eliminar
</a>
                                
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

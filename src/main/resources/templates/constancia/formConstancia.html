<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Constancia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4 th:text="${constancia.idConstancia != null} ? 'Editar Constancia' : 'Registrar Constancia'"></h4>
            <p>Completa los datos para guardar la constancia</p>
        </div>
        <a th:href="@{/constancia/constancias}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
        <div class="card-header-custom">
            <i class="fas fa-certificate"></i> Datos de la Constancia
        </div>
        <div class="p-4">
            <form th:action="@{/constancia/constancias/guardar}" th:object="${constancia}" method="post">
                <input type="hidden" th:field="*{idConstancia}">

                <div class="mb-3">
                    <label class="form-label">Fecha de Emisión</label>
                    <input type="date" th:field="*{fechaEmision}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tutorado</label>
                    <select class="form-select" th:field="*{tutorado.idTutorado}">
                        <option value="">-- Selecciona un tutorado --</option>
                        <option th:each="t : ${tutorados}"
                                th:value="${t.idTutorado}"
                                th:text="${t.nombre + ' ' + t.apellido + ' — ' + t.numeroControl}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Asignación (Tutor - Carrera)</label>
                    <select class="form-select" th:field="*{asignacion.idAsignacion}">
                        <option value="">-- Selecciona una asignación --</option>
                        <option th:each="a : ${asignaciones}"
                                th:value="${a.idAsignacion}"
                                th:text="${a.tutor.nombre + ' ' + a.tutor.apellido + ' — ' + a.carrera.nombre + ' | ' + a.semestre.nombre}">
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <a th:href="@{/constancia/constancias}" class="btn-regresar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Constancias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-certificate me-2"></i> Constancias</h4>
            <p>Gestiona las constancias emitidas a los tutorados</p>
        </div>
       <!--  <a th:href="@{/constancia/constancias/nuevo}" class="btn-nueva">
            <i class="fas fa-plus me-1"></i> Nueva Constancia
        </a> -->
    </div>

    <!-- ALERTA -->
    <div th:if="${msg != null}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>

    <!-- TABLA -->
    <div class="tabla-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-calendar me-1"></i> Fecha Emisión</th>
                        <th><i class="fas fa-user-graduate me-1"></i> Tutorado</th>
                        <th>No. Control</th>
                        <th><i class="fas fa-chalkboard-teacher me-1"></i> Tutor</th>
                        <th><i class="fas fa-graduation-cap me-1"></i> Carrera</th>
                        <th><i class="fas fa-calendar-alt me-1"></i> Semestre</th>
                        <th>Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(constancias)}">
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No hay constancias registradas</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="tmpConstancia : ${constancias}">
                        <td th:text="${tmpConstancia.idConstancia}"></td>
                        <td th:text="${tmpConstancia.fechaEmision}"></td>
                        <td>
                            <span class="tutor-nombre"
                                  th:text="${tmpConstancia.tutorado.nombre + ' ' + tmpConstancia.tutorado.apellido}">
                            </span>
                        </td>
                        <td>
                            <span class="numero-control"
                                  th:text="${tmpConstancia.tutorado.numeroControl}">
                            </span>
                        </td>
                        <td th:text="${tmpConstancia.asignacion.tutor.nombre + ' ' + tmpConstancia.asignacion.tutor.apellido}"></td>
                        <td th:text="${tmpConstancia.asignacion.carrera.nombre}"></td>
                        <td th:text="${tmpConstancia.asignacion.semestre.nombre}"></td>
                        <td>
                            <div class="acciones">
                                <a th:href="@{/constancia/ver/{id}(id=${tmpConstancia.idConstancia})}"
                                   class="btn-accion btn-ver">
                                    <i class="fas fa-eye"></i> Ver
                                </a>
                                <a th:href="@{/constancia/editar/{id}(id=${tmpConstancia.idConstancia})}"
                                   class="btn-accion btn-editar">
                                    <i class="fas fa-edit"></i> Editar
                                </a>
                                <a th:href="@{/constancia/eliminar(id=${tmpConstancia.idConstancia})}"
                                   class="btn-accion btn-eliminar">
                                    <i class="fas fa-trash"></i> Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-user-tag me-2"></i> Roles</h4>
            <p>Gestiona los roles del sistema de tutorías</p>
        </div>
        <a th:href="@{/rol/roles/nuevo}" class="btn-nueva">
            <i class="fas fa-plus me-1"></i> Nuevo Rol
        </a>
    </div>

    <!-- ALERTA -->
    <div th:if="${msg != null}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>

    <!-- TABLA -->
    <div class="tabla-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-user-tag me-1"></i> Nombre</th>
                        <th>Descripción</th>
                        <th>Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(roles)}">
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No hay roles registrados</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="tmpRol : ${roles}">
                        <td th:text="${tmpRol.idRol}"></td>
                        <td>
                            <span class="tutor-nombre" th:text="${tmpRol.nombre}"></span>
                        </td>
                        <td th:text="${tmpRol.descripcion}"></td>
                        <td>
                            <div class="acciones">
                                <a th:href="@{/rol/ver/{id}(id=${tmpRol.idRol})}"
                                   class="btn-accion btn-ver">
                                    <i class="fas fa-eye"></i> Ver
                                </a>
                                <a th:href="@{/rol/editar/{id}(id=${tmpRol.idRol})}"
                                   class="btn-accion btn-editar">
                                    <i class="fas fa-edit"></i> Editar
                                </a>
                                <a th:href="@{/rol/eliminar(id=${tmpRol.idRol})}"
                                   class="btn-accion btn-eliminar">
                                    <i class="fas fa-trash"></i> Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Rol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4 th:text="${rol.idRol != null} ? 'Editar Rol' : 'Registrar Rol'"></h4>
            <p>Completa los datos para guardar el rol</p>
        </div>
        <a th:href="@{/rol/roles}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
        <div class="card-header-custom">
            <i class="fas fa-user-tag"></i> Datos del Rol
        </div>
        <div class="p-4">
            <form id="formRol"
                  th:action="@{/rol/roles/guardar}"
                  th:object="${rol}"
                  method="post"
                  onsubmit="return validarFormulario()">

                <input type="hidden" th:field="*{idRol}">

                <div class="mb-3">
                    <label class="form-label campo-requerido">Nombre del Rol</label>
                    <select th:field="*{nombre}" id="nombre" class="form-select">
                        <option value="">-- Selecciona un rol --</option>
                       
                        <option value="COORDINADOR_CARRERA">COORDINADOR DE CARRERA</option>
                        <option value="COORDINADOR_INSTITUCIONAL">COORDINADOR INSTITUCIONAL</option>
                        <option value="JEFE_ACADEMICO">JEFE ACADÉMICO</option>
                        <option value="DESARROLLO_ACADEMICO">DEPARTAMENTO DE DESARROLLO ACADEMICO</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <div class="text-danger small mt-1" id="errorNombre"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label campo-requerido">Descripción</label>
                    <input type="text" th:field="*{descripcion}" id="descripcion"
                           class="form-control"
                           placeholder="Describe brevemente el rol...">
                    <div class="text-danger small mt-1" id="errorDescripcion"></div>
                </div>

                <!-- Leyenda de campos obligatorios -->
                <p class="text-muted small mt-2">
                    <span style="color: red; font-weight: bold;">*</span> Campos obligatorios
                </p>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <a th:href="@{/rol/roles}" class="btn-regresar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function validarFormulario() {
        let valido = true;

        document.getElementById('errorNombre').textContent      = '';
        document.getElementById('errorDescripcion').textContent = '';

        const nombre      = document.getElementById('nombre').value;
        const descripcion = document.getElementById('descripcion').value.trim();

        if (nombre === '') {
            document.getElementById('errorNombre').textContent = '⚠ Selecciona un rol.';
            valido = false;
        }

        if (descripcion === '') {
            document.getElementById('errorDescripcion').textContent = '⚠ La descripción es obligatoria.';
            valido = false;
        }

        return valido;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario PAT por Carrera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4 th:text="${patCarrera.idPatCarrera == null} ? 'Nuevo PAT por Carrera' : 'Editar PAT por Carrera'"></h4>
            <p>Completa los datos para guardar el PAT por carrera</p>
        </div>
        <a th:href="@{/patcarrera/lista}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card" style="max-width: 950px;">
        <div class="card-header-custom">
            <i class="fas fa-book"></i> Datos del PAT por Carrera
        </div>
        <div class="p-4">
            <form th:action="@{/patcarrera/guardar}" method="post">
                <input type="hidden" name="idPatCarrera" th:value="${patCarrera.idPatCarrera}">
                <input type="hidden" name="estatus"      th:value="${patCarrera.estatus}">
                <input type="hidden" id="idPatCarreraHidden"
                       th:value="${patCarrera.idPatCarrera != null ? patCarrera.idPatCarrera : ''}">

                <div class="mb-3">
                    <label class="form-label campo-requerido">PAT General</label>
                    <select class="form-select" name="pat.idPat" id="selectPat" onchange="cargarActividades()">
                        <option value="">-- Selecciona un PAT --</option>
                        <option th:each="p : ${pats}"
                                th:value="${p.idPat}"
                                th:text="${p.titulo}"
                                th:selected="${patCarrera.pat != null and patCarrera.pat.idPat == p.idPat}">
                        </option>
                    </select>
                </div>

                <!-- INFO DEL PAT SELECCIONADO -->
                <div id="infoPat" class="filtro-card mb-3" style="display:none;">
                    <div>
                        <p class="mb-1" style="font-size:0.9rem;">
                            <span style="font-weight:700; color:#1a3a5c;">
                                <i class="fas fa-heading me-1"></i> Título:
                            </span>
                            <span id="tituloPat"></span>
                        </p>
                        <p class="mb-0" style="font-size:0.9rem;">
                            <span style="font-weight:700; color:#1a3a5c;">
                                <i class="fas fa-align-left me-1"></i> Descripción:
                            </span>
                            <span id="descPat"></span>
                        </p>
                    </div>
                </div>
                
                

              <!--    <div class="mb-3">
                    <label class="form-label campo-requerido">Carrera</label>
                    <select class="form-select" name="carrera.idCarrera">
                        <option value="">-- Selecciona una Carrera --</option>
                        <option th:each="c : ${carreras}"
                                th:value="${c.idCarrera}"
                                th:text="${c.nombre}"
                                th:selected="${patCarrera.carrera != null and patCarrera.carrera.idCarrera == c.idCarrera}">
                        </option>
                    </select>
                </div> -->
                
                
                <div class="mb-3">
    <label class="form-label campo-requerido">Carrera</label>

    <!-- Si es Coordinador de Carrera: solo texto -->
    <div th:if="${esCoordinadorCarrera}">
        <input type="hidden" name="carrera.idCarrera" 
               th:value="${carreras[0].idCarrera}">
        <input type="text" class="form-control" 
               th:value="${carreras[0].nombre}" readonly>
    </div>

    <!-- Si es Administrador: dropdown normal -->
    <div th:unless="${esCoordinadorCarrera}">
        <select class="form-select" name="carrera.idCarrera">
            <option value="">-- Selecciona una Carrera --</option>
            <option th:each="c : ${carreras}"
                    th:value="${c.idCarrera}"
                    th:text="${c.nombre}"
                    th:selected="${patCarrera.carrera != null and patCarrera.carrera.idCarrera == c.idCarrera}">
            </option>
        </select>
    </div>
</div>
                

                <div class="mb-4">
                    <label class="form-label campo-requerido">Semestre</label>
                    <select class="form-select" name="semestre.idSemestre" id="selectSemestre">
                        <option value="">-- Selecciona un Semestre --</option>
                        <option th:each="s : ${semestres}"
                                th:value="${s.idSemestre}"
                                th:text="${s.nombre}"
                                th:selected="${patCarrera.semestre != null and patCarrera.semestre.idSemestre == s.idSemestre}">
                        </option>
                    </select>
                </div>

                <!-- ACTIVIDADES -->
                <hr style="border-color: #e0e7ef;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span style="font-weight:700; color:#1a3a5c; font-size:0.95rem;">
                        <i class="fas fa-list-check me-1"></i> Actividades del PAT
                    </span>
                    <button type="button" class="btn-accion btn-generar" onclick="agregarFila()">
                        <i class="fas fa-plus"></i> Agregar actividad
                    </button>
                </div>

                <div class="table-responsive mb-4">
                    <table class="table table-hover mb-0" id="tablaActividades"
                           style="border-radius:10px; overflow:hidden;">
                        <thead>
                            <tr style="background:#1a3a5c; color:white;">
                                <th style="padding:0.85rem 1rem; font-size:0.82rem; text-transform:uppercase;">#</th>
                                <th style="padding:0.85rem 1rem; font-size:0.82rem; text-transform:uppercase;">Nombre <span style="color:#ff6b6b;">*</span></th>
                                <th style="padding:0.85rem 1rem; font-size:0.82rem; text-transform:uppercase;">Descripción</th>
                                <th style="padding:0.85rem 1rem; font-size:0.82rem; text-transform:uppercase;">Semana <span style="color:#ff6b6b;">*</span></th>
                                <th style="padding:0.85rem 1rem; font-size:0.82rem; text-transform:uppercase;">Fecha <span style="color:#ff6b6b;">*</span></th>
                                <th style="padding:0.85rem 1rem;"></th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla"></tbody>
                    </table>
                </div>

                <!-- Leyenda de campos obligatorios -->
                <p class="text-muted small mt-2">
                    <span style="color: red; font-weight: bold;">*</span> Campos obligatorios
                </p>

                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <a th:href="@{/patcarrera/lista}" class="btn-regresar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let contador = 0;
    
    function validarViernes(input) {
    if (!input.value) return;
    const fecha = new Date(input.value + 'T00:00:00');
    if (fecha.getDay() !== 5) {
        input.style.borderColor = '#dc3545';
        let error = input.parentNode.querySelector('.error-fecha');
        if (!error) {
            error = document.createElement('div');
            error.className = 'text-danger small mt-1 error-fecha';
            input.parentNode.appendChild(error);
        }
        error.textContent = '⚠ La fecha debe ser un viernes.';
        input.value = '';
        setTimeout(() => { input.style.borderColor = ''; }, 2000);
    } else {
        input.style.borderColor = '';
        const error = input.parentNode.querySelector('.error-fecha');
        if (error) error.textContent = '';
    }
}

function validarSemana(input) {
    const val = parseInt(input.value);
    if (isNaN(val) || val < 1 || val > 10) {
        input.style.borderColor = '#dc3545';
        let error = input.parentNode.querySelector('.error-semana');
        if (!error) {
            error = document.createElement('div');
            error.className = 'text-danger small mt-1 error-semana';
            input.parentNode.appendChild(error);
        }
        error.textContent = '⚠ La semana debe ser entre 1 y 10.';
        input.value = '';
        setTimeout(() => { input.style.borderColor = ''; }, 2000);
    } else {
        input.style.borderColor = '';
        const error = input.parentNode.querySelector('.error-semana');
        if (error) error.textContent = '';
    }
}

    function cargarActividades() {
        const idPat = document.getElementById('selectPat').value;
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = '';
        contador = 0;

        if (!idPat) {
            document.getElementById('infoPat').style.display = 'none';
            return;
        }

        fetch('/patcarrera/infoPat/' + idPat)
            .then(res => res.json())
            .then(pat => {
                document.getElementById('tituloPat').textContent = pat.titulo || '';
                document.getElementById('descPat').textContent = pat.descripcion || 'Sin descripción';
                document.getElementById('infoPat').style.display = 'flex';
                if (pat.semestre) {
                    document.getElementById('selectSemestre').value = pat.semestre.idSemestre;
                }
            });

        fetch('/patcarrera/actividades/' + idPat)
            .then(res => res.json())
            .then(actividades => {
                actividades.forEach(act => {
                    contador++;
                    agregarFilaConDatos(act.nombre, act.descripcion, act.semana, act.fecha);
                });
            });
    }

    function agregarFilaConDatos(nombre, descripcion, semana, fecha) {
        const tbody = document.getElementById('cuerpoTabla');
        const fila = `
            <tr>
                <td style="padding:0.7rem 1rem; vertical-align:middle;">${contador}</td>
                <td style="padding:0.5rem 0.8rem;">
                    <input type="text" name="actNombre[]" class="form-control form-control-sm"
                           value="${nombre || ''}" placeholder="Nombre">
                </td>
                <td style="padding:0.5rem 0.8rem;">
                    <input type="text" name="actDescripcion[]" class="form-control form-control-sm"
                           value="${descripcion || ''}" placeholder="Descripción">
                </td>
                <td style="padding:0.5rem 0.8rem;">
                   <input type="number" name="actSemana[]" class="form-control form-control-sm"
       value="${semana || ''}" placeholder="Ej. 1" min="1" max="10"
       onchange="validarSemana(this)">
                </td>
                <td style="padding:0.5rem 0.8rem;">
                   <input type="date" name="actFecha[]" class="form-control form-control-sm"
                   value="${fecha || ''}" onchange="validarViernes(this)">
                </td>
                <td style="padding:0.5rem 0.8rem; text-align:center;">
                    <button type="button" class="btn-accion btn-eliminar" onclick="eliminarFila(this)">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>`;
        tbody.insertAdjacentHTML('beforeend', fila);
    }

    function agregarFila() {
        contador++;
        agregarFilaConDatos('', '', '', '');
    }

    function eliminarFila(btn) {
        btn.closest('tr').remove();
    }

    window.onload = function () {
        const idPat        = document.getElementById('selectPat').value;
        const idPatCarrera = document.getElementById('idPatCarreraHidden').value;

        if (!idPat) return;

        fetch('/patcarrera/infoPat/' + idPat)
            .then(res => res.json())
            .then(pat => {
                document.getElementById('tituloPat').textContent = pat.titulo || '';
                document.getElementById('descPat').textContent = pat.descripcion || 'Sin descripción';
                document.getElementById('infoPat').style.display = 'flex';
            });

        if (idPatCarrera) {
            fetch('/patcarrera/actividadesPatCarrera/' + idPatCarrera)
                .then(res => res.json())
                .then(actividades => {
                    actividades.forEach(act => {
                        if (act.estatus === 1) {
                            contador++;
                            agregarFilaConDatos(act.nombre, act.descripcion, act.semana, act.fecha);
                        }
                    });
                });
        }
    };
</script>
</body>
</html>

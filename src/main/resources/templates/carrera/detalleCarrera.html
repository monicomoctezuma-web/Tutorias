<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Carrera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-graduation-cap me-2"></i> Detalle de la Carrera</h4>
            <p>Información completa de la carrera seleccionada</p>
        </div>
        <a th:href="@{/carrera/carreras}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- DETALLE -->
    <div class="detalle-card">
        <div class="card-header-custom">
            <i class="fas fa-info-circle"></i> Información de la Carrera
        </div>
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">ID</span>
                <span class="info-value" th:text="${carrera.idCarrera}"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Estatus</span>
                <span th:if="${carrera.estatus == 1}" class="badge-activo">✔ Activo</span>
                <span th:if="${carrera.estatus != 1}" class="badge-inactivo">✘ Inactivo</span>
            </div>
            <div class="info-item">
                <span class="info-label">Nombre</span>
                <span class="info-value" th:text="${carrera.nombre}"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Clave</span>
                <span class="info-value" th:text="${carrera.clave}"></span>
            </div>
        </div>
    </div>

    <!-- BOTÓN REGRESAR -->
    <a th:href="@{/carrera/carreras}" class="btn-regresar">
        <i class="fas fa-arrow-left"></i> Volver a la lista
    </a>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

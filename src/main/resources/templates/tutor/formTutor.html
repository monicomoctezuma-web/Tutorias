<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Tutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <div class="page-header">
        <div>
            <h4 th:text="${tutor.idTutor != null} ? 'Editar Tutor' : 'Registrar Tutor'"></h4>
            <p>Completa los datos para guardar el tutor</p>
        </div>
        <a th:href="@{/tutor/tutores}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <div class="form-card">
        <div class="card-header-custom">
            <i class="fas fa-chalkboard-teacher"></i> Datos del Tutor
        </div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="p-4">
            <form id="formTutor"
                  th:action="@{/tutor/tutores/guardar}"
                  th:object="${tutor}"
                  method="post"
                  enctype="multipart/form-data"
                  onsubmit="return validarFormulario()">

                <input type="hidden" th:field="*{idTutor}">
                <input type="hidden" th:field="*{estatus}">
                <input type="hidden" th:field="*{foto}">

                <div class="mb-3">
                    <label class="form-label campo-requerido">Nombre</label>
                    <input type="text" th:field="*{nombre}" id="nombre"
                           class="form-control"
                           placeholder="Nombre del tutor">
                    <div class="text-danger small mt-1" id="errorNombre"></div>
                </div>

               <div class="mb-3">
                    <label class="form-label campo-requerido">Apellido</label>
                    <input type="text" th:field="*{apellido}" id="apellido"
                           class="form-control"
                           placeholder="Apellido del tutor">
                    <div class="text-danger small mt-1" id="errorApellido"></div>
                </div>
                
                <div class="mb-3">
    <label class="form-label campo-requerido">Número de Trabajador</label>
    <input type="text" th:field="*{numeroTrabajador}" id="numeroTrabajador"
           class="form-control"
           placeholder="Ej. T-12345">
    <div class="text-danger small mt-1" id="errorNumeroTrabajador"></div>
</div>

                <div class="mb-3">
                    <label class="form-label campo-requerido">Teléfono</label>
                    <input type="text" th:field="*{telefono}" id="telefono"
                           class="form-control"
                           placeholder="Ej. 7471234567"
                           maxlength="10"
                           oninput="soloNumeros(this)">
                    <div class="text-danger small mt-1" id="errorTelefono"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Foto</label>
                    <input type="file" name="fotoArchivo" class="form-control">
                    <div th:if="${tutor.foto != null}" class="mt-2">
                        <p class="text-muted small">Foto actual:</p>
                        <img th:src="@{/fotos/tutores/{foto}(foto=${tutor.foto})}"
                             style="height:80px; width:80px; object-fit:cover; border-radius:50%; border:2px solid #e0e7ef;">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label campo-requerido">Carrera</label>
                    <select class="form-select" id="carrera" th:field="*{carrera.idCarrera}">
                        <option value="">-- Selecciona una carrera --</option>
                        <option th:each="tmpCarrera : ${carreras}"
                                th:value="${tmpCarrera.idCarrera}"
                                th:text="${tmpCarrera.nombre}">
                        </option>
                    </select>
                    <div class="text-danger small mt-1" id="errorCarrera"></div>
                </div>

                <p class="text-muted small mt-2">
                    <span style="color: red; font-weight: bold;">*</span> Campos obligatorios
                </p>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <a th:href="@{/tutor/tutores}" class="btn-regresar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function soloNumeros(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
    }

    function validarFormulario() {
        let valido = true;

        document.getElementById('errorNombre').textContent   = '';
        document.getElementById('errorApellido').textContent = '';
        document.getElementById('errorTelefono').textContent = '';
        document.getElementById('errorCarrera').textContent  = '';

        const nombre   = document.getElementById('nombre').value.trim();
        const apellido = document.getElementById('apellido').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const carrera  = document.getElementById('carrera').value;
        
        document.getElementById('errorNumeroTrabajador').textContent = '';
const numeroTrabajador = document.getElementById('numeroTrabajador').value.trim();
if (numeroTrabajador === '') {
    document.getElementById('errorNumeroTrabajador').textContent = '⚠ El número de trabajador es obligatorio.';
    valido = false;
}

        if (nombre === '') {
            document.getElementById('errorNombre').textContent = '⚠ El nombre es obligatorio.';
            valido = false;
        }
        if (apellido === '') {
            document.getElementById('errorApellido').textContent = '⚠ El apellido es obligatorio.';
            valido = false;
        }
        if (telefono === '') {
            document.getElementById('errorTelefono').textContent = '⚠ El teléfono es obligatorio.';
            valido = false;
        } else if (telefono.length !== 10) {
            document.getElementById('errorTelefono').textContent = '⚠ El teléfono debe tener 10 dígitos.';
            valido = false;
        }
        if (carrera === '') {
            document.getElementById('errorCarrera').textContent = '⚠ Selecciona una carrera.';
            valido = false;
        }

        return valido;
    }
</script>
</body>
</html>

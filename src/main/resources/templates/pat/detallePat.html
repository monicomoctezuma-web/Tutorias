<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle PAT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-file-alt me-2"></i> Detalle del PAT</h4>
            <p>Información completa del Programa de Acción Tutorial</p>
        </div>
        <a th:href="@{/pat/pats}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- INFORMACIÓN DEL PAT -->
    <div class="detalle-card">
        <div class="card-header-custom">
            <i class="fas fa-info-circle"></i> Información del PAT
        </div>
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">ID</span>
                <span class="info-value" th:text="${pat.idPat}"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Estatus</span>
                <span th:if="${pat.estatus == 1}" class="badge-activo">✔ Activo</span>
                <span th:if="${pat.estatus != 1}" class="badge-inactivo">✘ Inactivo</span>
            </div>
            <div class="info-item">
                <span class="info-label">Título</span>
                <span class="info-value" th:text="${pat.titulo}"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Semestre</span>
                <span class="info-value" th:text="${pat.semestre.nombre}"></span>
            </div>
            <div class="info-item" style="grid-column: span 2;">
                <span class="info-label">Descripción</span>
                <span class="info-value" th:text="${pat.descripcion}"></span>
            </div>
        </div>
    </div>

    <!-- ACTIVIDADES DEL PAT -->
    <div class="tabla-card">
        <div class="card-header-custom">
            <i class="fas fa-list-check"></i> Actividades del PAT
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-tag me-1"></i> Nombre</th>
                        <th>Descripción</th>
                        <th class="text-center">Semana</th>
                        <th>Estatus</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(actividades)}">
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No hay actividades registradas</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="act, iterStat : ${actividades}">
                        <td th:text="${iterStat.count}"></td>
                        <td>
                            <span class="tutor-nombre" th:text="${act.nombre}"></span>
                        </td>
                        <td th:text="${act.descripcion}"></td>
                        <td class="text-center" th:text="${act.semana}"></td>
                        <td>
                            <span th:if="${act.estatus == 1}" class="badge-activo">✔ Activo</span>
                            <span th:if="${act.estatus != 1}" class="badge-inactivo">✘ Inactivo</span>
                        </td>
                        <td th:text="${act.fecha}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- BOTÓN REGRESAR -->
    <a th:href="@{/pat/pats}" class="btn-regresar">
        <i class="fas fa-arrow-left"></i> Volver a la lista
    </a>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

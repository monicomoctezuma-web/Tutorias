<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Header -->
        <div class="login-header">
            <i class="fas fa-graduation-cap"></i>
            <h4>Sistema de Tutorías</h4>
            <p>Tecnológico de Chilpancingo</p>
        </div>

        <!-- Body -->
        <div class="login-body">
            <h5><i class="fas fa-sign-in-alt me-1"></i> Iniciar Sesión</h5>

            <!-- Error -->
            <div th:if="${param.error}" class="alert-danger">
                <i class="fas fa-exclamation-circle me-1"></i> Usuario o contraseña incorrectos.
            </div>

            <!-- Logout -->
            <div th:if="${param.logout}" class="alert-success">
                <i class="fas fa-check-circle me-1"></i> Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">

                <label class="login-label">
                    <i class="fas fa-user me-1"></i> Usuario
                </label>
                <div class="login-input-group">
                    <span><i class="fas fa-user"></i></span>
                    <input type="text" name="username" placeholder="Ingresa tu usuario" required>
                </div>

                <label class="login-label">
                    <i class="fas fa-lock me-1"></i> Contraseña
                </label>
                <div class="login-input-group" style="margin-bottom:1.5rem;">
                    <span><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt me-1"></i> Entrar
                </button>

                <a href="/inicio" class="btn-volver-inicio">
                    <i class="fas fa-arrow-left me-1"></i> Volver al inicio
                </a>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

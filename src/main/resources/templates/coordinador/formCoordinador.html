<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Coordinador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4 th:text="${coordinador.idCoordinador != null} ? 'Editar Coordinador' : 'Registrar Coordinador'"></h4>
            <p>Completa los datos para guardar el coordinador</p>
        </div>
        <a th:href="@{/coordinador/coordinadores}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
        <div class="card-header-custom">
            <i class="fas fa-user-tie"></i> Datos del Coordinador
        </div>
        <div class="p-4">
            <form id="formCoordinador"
                  th:action="@{/coordinador/coordinadores/guardar}"
                  th:object="${coordinador}"
                  method="post"
                  onsubmit="return validarFormulario()">

                <input type="hidden" th:field="*{idCoordinador}">

                <div class="mb-3">
                    <label class="form-label campo-requerido">Usuario (Coordinador)</label>
                    <select class="form-select" id="usuario" th:field="*{usuario.idUsuario}">
                        <option value="">-- Selecciona un usuario --</option>
                        <option th:each="u : ${usuarios}"
                                th:value="${u.idUsuario}"
                                th:text="${u.nombre + ' ' + u.apellido}">
                        </option>
                    </select>
                    <div class="text-danger small mt-1" id="errorUsuario"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label campo-requerido">Carrera</label>
                    <select class="form-select" id="carrera" th:field="*{carrera.idCarrera}">
                        <option value="">-- Selecciona una carrera --</option>
                        <option th:each="c : ${carreras}"
                                th:value="${c.idCarrera}"
                                th:text="${c.nombre}">
                        </option>
                    </select>
                    <div class="text-danger small mt-1" id="errorCarrera"></div>
                </div>

                <!-- Leyenda de campos obligatorios -->
                <p class="text-muted small mt-2">
                    <span style="color: red; font-weight: bold;">*</span> Campos obligatorios
                </p>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <a th:href="@{/coordinador/coordinadores}" class="btn-regresar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function validarFormulario() {
        let valido = true;

        document.getElementById('errorUsuario').textContent = '';
        document.getElementById('errorCarrera').textContent = '';

        if (document.getElementById('usuario').value === '') {
            document.getElementById('errorUsuario').textContent = '⚠ Selecciona un coordinador.';
            valido = false;
        }

        if (document.getElementById('carrera').value === '') {
            document.getElementById('errorCarrera').textContent = '⚠ Selecciona una carrera.';
            valido = false;
        }

        return valido;
    }
</script>
</body>
</html>

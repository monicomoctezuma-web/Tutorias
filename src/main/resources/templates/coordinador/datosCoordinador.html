<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Coordinadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-user-tie me-2"></i> Coordinadores</h4>
            <p>Gestiona los coordinadores asignados a cada carrera</p>
        </div>
        <a th:href="@{/coordinador/coordinadores/nuevo}" class="btn-nueva">
            <i class="fas fa-plus me-1"></i> Nuevo Coordinador
        </a>
    </div>

    <!-- ALERTA -->
    <div th:if="${msg != null}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>

    <!-- TABLA -->
    <div class="tabla-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-user-tie me-1"></i> Coordinador</th>
                        <th><i class="fas fa-phone me-1"></i> Teléfono</th>
                        <th><i class="fas fa-graduation-cap me-1"></i> Carrera</th>
                        <th>Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(coordinadores)}">
                        <td colspan="5">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No hay coordinadores registrados</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="tmpCoordinador : ${coordinadores}">
                        <td th:text="${tmpCoordinador.idCoordinador}"></td>
                        <td>
                            <span class="tutor-nombre"
                                  th:text="${tmpCoordinador.usuario.nombre + ' ' + tmpCoordinador.usuario.apellido}">
                            </span>
                        </td>
                        <td th:text="${tmpCoordinador.usuario.telefono}"></td>
                        <td th:text="${tmpCoordinador.carrera.nombre}"></td>
                        <td>
                            <div class="acciones">
                                <a th:href="@{/coordinador/ver/{id}(id=${tmpCoordinador.idCoordinador})}"
                                   class="btn-accion btn-ver">
                                    <i class="fas fa-eye"></i> Ver
                                </a>
                                <a th:href="@{/coordinador/editar/{id}(id=${tmpCoordinador.idCoordinador})}"
                                   class="btn-accion btn-editar">
                                    <i class="fas fa-edit"></i> Editar
                                </a>
                              <!--   <a th:href="@{/coordinador/eliminar(id=${tmpCoordinador.idCoordinador})}"
                                   class="btn-accion btn-eliminar">
                                    <i class="fas fa-trash"></i> Eliminar
                                </a>-->
                                
                                <a th:href="@{/coordinador/eliminar(id=${tmpCoordinador.idCoordinador})}"
   class="btn-accion btn-eliminar"
   onclick="return confirm('¿Estás seguro de que deseas eliminar este coordinador?')">
    <i class="fas fa-trash"></i> Eliminar
</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio Coordinadora Institucional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <div class="page-header">
        <div>
            <h4><i class="fas fa-home me-2"></i> Bienvenida, Coordinadora Institucional</h4>
            <p>Selecciona una opción para continuar</p>
        </div>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-md-6">
            <div class="card shadow text-center p-4">
                <i class="fas fa-user-tie fa-3x text-primary mb-3"></i>
                <h5>Coordinadores por Carrera</h5>
                <p class="text-muted">Asigna y actualiza el coordinador de tutoría de cada carrera.</p>
                <a th:href="@{/coordinador/coordinadores}" class="btn btn-primary mt-2">
                    <i class="fas fa-arrow-right me-1"></i> Ir
                </a>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

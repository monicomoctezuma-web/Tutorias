<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Semestres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4><i class="fas fa-calendar-alt me-2"></i> Semestres</h4>
            <p>Gestiona los semestres del programa de tutorías</p>
        </div>
        <a th:href="@{/semestre/semestres/nuevo}" class="btn-nueva">
            <i class="fas fa-plus me-1"></i> Nuevo Semestre
        </a>
    </div>

    <!-- ALERTA -->
    <div th:if="${msg != null}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>

    <!-- PESTAÑAS -->
    <ul class="nav nav-tabs mb-3" id="tabSemestres">
        <li class="nav-item">
            <a class="nav-link active" id="tab-activos" data-bs-toggle="tab" href="#activos">
                <i class="fas fa-check-circle me-1"></i> Activos
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="tab-inactivos" data-bs-toggle="tab" href="#inactivos">
                <i class="fas fa-times-circle me-1"></i> Inactivos
            </a>
        </li>
    </ul>

    <div class="tab-content">

        <!-- PESTAÑA ACTIVOS -->
        <div class="tab-pane fade show active" id="activos">
            <div class="tabla-card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th><i class="fas fa-tag me-1"></i> Nombre</th>
                                <th><i class="fas fa-calendar me-1"></i> Fecha Inicio</th>
                                <th><i class="fas fa-calendar-check me-1"></i> Fecha Fin</th>
                                <th>Estatus</th>
                                <th>Operaciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(semestres)}">
                                <td colspan="6">
                                    <div class="empty-state">
                                        <i class="fas fa-inbox"></i>
                                        <p>No hay semestres registrados</p>
                                    </div>
                                </td>
                            </tr>
                            <tr th:each="s : ${semestres}" th:if="${s.activo == 1}">
                                <td th:text="${s.idSemestre}"></td>
                                <td><span class="tutor-nombre" th:text="${s.nombre}"></span></td>
                                <td th:text="${s.fechaInicio}"></td>
                                <td th:text="${s.fechaFin}"></td>
                                <td><span class="badge-activo">✔ Activo</span></td>
                                <td>
                                    <div class="acciones">
                                        <a th:href="@{/semestre/ver/{id}(id=${s.idSemestre})}"
                                           class="btn-accion btn-ver">
                                            <i class="fas fa-eye"></i> Ver
                                        </a>
                                        <a th:href="@{/semestre/editar/{id}(id=${s.idSemestre})}"
                                           class="btn-accion btn-editar">
                                            <i class="fas fa-edit"></i> Editar
                                        </a>
                                        <a th:href="@{/semestre/eliminar(id=${s.idSemestre})}"
                                           class="btn-accion btn-eliminar"
                                           onclick="return confirm('¿Estás seguro de que deseas eliminar este semestre?')">
                                            <i class="fas fa-trash"></i> Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PESTAÑA INACTIVOS -->
        <div class="tab-pane fade" id="inactivos">
            <div class="tabla-card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th><i class="fas fa-tag me-1"></i> Nombre</th>
                                <th><i class="fas fa-calendar me-1"></i> Fecha Inicio</th>
                                <th><i class="fas fa-calendar-check me-1"></i> Fecha Fin</th>
                                <th>Estatus</th>
                                <th>Operaciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${semestres}" th:if="${s.activo != 1}">
                                <td th:text="${s.idSemestre}"></td>
                                <td><span class="tutor-nombre" th:text="${s.nombre}"></span></td>
                                <td th:text="${s.fechaInicio}"></td>
                                <td th:text="${s.fechaFin}"></td>
                                <td><span class="badge-inactivo">✘ Inactivo</span></td>
                                <td>
                                    <div class="acciones">
                                        <a th:href="@{/semestre/activar(id=${s.idSemestre})}"
                                           class="btn-accion btn-ver"
                                           onclick="return confirm('¿Activar este semestre?')">
                                            <i class="fas fa-check"></i> Activar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const tabGuardada = sessionStorage.getItem('tabSemestres');
    if (tabGuardada) {
        const tab = document.querySelector(tabGuardada);
        if (tab) new bootstrap.Tab(tab).show();
        sessionStorage.removeItem('tabSemestres');
    }
    document.querySelectorAll('#tabSemestres .nav-link').forEach(function(tab) {
        tab.addEventListener('click', function() {
            sessionStorage.setItem('tabSemestres', '#' + this.id);
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Reporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
            <h4 th:text="${reporte.idReporte != null} ? 'Editar Reporte' : 'Registrar Reporte'"></h4>
            <p>Completa los datos para guardar el reporte de sesión</p>
        </div>
        <a th:href="@{/reporte/reportes}" class="btn-nueva">
            <i class="fas fa-arrow-left me-1"></i> Regresar
        </a>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
        <div class="card-header-custom">
            <i class="fas fa-file-alt"></i> Datos del Reporte
        </div>
        <div class="p-4">
            <form th:action="@{/reporte/reportes/guardar}" th:object="${reporte}" method="post">
                <input type="hidden" th:field="*{idReporte}">

                <div class="mb-3">
                    <label class="form-label campo-requerido">Fecha del Reporte</label>
                    <input type="date" th:field="*{fechaReporte}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label campo-requerido">Sesión (Semana - Fecha - Tutor)</label>
                    <select class="form-select" th:field="*{sesion.idSesion}">
                        <option value="">-- Selecciona una sesión --</option>
                        <option th:each="s : ${sesiones}"
                                th:value="${s.idSesion}"
                                th:text="'Semana ' + ${s.semana} + ' — ' + ${s.fecha} + ' | ' + ${s.asignacion.tutor.nombre} + ' ' + ${s.asignacion.tutor.apellido}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea th:field="*{observaciones}" class="form-control" rows="4"
                              placeholder="Escribe las observaciones del tutor..."></textarea>
                </div>

                <!-- Leyenda de campos obligatorios -->
                <p class="text-muted small mt-2">
                    <span style="color: red; font-weight: bold;">*</span> Campos obligatorios
                </p>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <a th:href="@{/reporte/reportes}" class="btn-regresar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

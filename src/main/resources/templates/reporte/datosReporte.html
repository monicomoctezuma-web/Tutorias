<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reportes del Tutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div th:replace="~{fragmento/fragment :: header}"></div>

<div class="main-content">

    <!-- ENCABEZADO -->
    <div class="page-header">
        <div>
        <h4><i class="fas fa-file-alt me-2"></i> Reportes del Tutor</h4>
<p th:if="${nombreTutor != null}">Tutor: <strong th:text="${nombreTutor}"></strong></p>
<p th:if="${nombreTutor == null}">Consulta y gestiona los reportes de sesión por tutor</p>    
        </div>
    </div>

    <!-- ALERTA -->
    <div th:if="${msg != null}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>

    <!-- PASO 1: Seleccionar Tutor -->
    <!--<div class="detalle-card">-->
    <!-- PASO 1: Seleccionar Tutor -->
   <div class="detalle-card">
    <div class="card-header-custom">
        <i class="fas fa-chalkboard-teacher"></i> Tutor
    </div>
    <div class="p-3">
        <div th:if="${nombreTutor != null}">
            <strong th:text="${nombreTutor}"></strong>
        </div>
        <form th:if="${nombreTutor == null}" method="get" th:action="@{/reporte/reportes}"
              class="d-flex gap-2 flex-wrap align-items-center">
            <select name="idTutor" class="form-select" style="max-width: 350px;">
                <option value="">-- Selecciona un tutor --</option>
                <option th:each="t : ${tutores}"
                        th:value="${t.idTutor}"
                        th:text="${t.nombre + ' ' + t.apellido}"
                        th:selected="${t.idTutor == idTutorSeleccionado}">
                </option>
            </select>
            <button type="submit" class="btn-buscar">
                <i class="fas fa-search me-1"></i> Buscar
            </button>
        </form>
    </div>
</div>
    <!-- PASO 2: Seleccionar Sesión -->
    <div th:if="${sesiones != null}" class="detalle-card">
  
        <div class="card-header-custom">
            <i class="fas fa-calendar-check"></i> Paso 2 — Selecciona la Sesión
        </div>
        <div class="p-3">
            <form method="get" th:action="@{/reporte/reportes}"
                  class="d-flex gap-2 flex-wrap align-items-center">
                <input type="hidden" name="idTutor" th:value="${idTutorSeleccionado}">
                <select name="idSesion" class="form-select" style="max-width: 450px;">
                    <option value="">-- Selecciona una sesión --</option>
                    <option th:each="s : ${sesiones}"
                            th:value="${s.idSesion}"
                            th:text="'Semana ' + ${s.semana} + ' — Viernes ' + ${s.fecha}"
                            th:selected="${s.idSesion == idSesionSeleccionada}">
                    </option>
                </select>
                <button type="submit" class="btn-buscar">
                    <i class="fas fa-search me-1"></i> Cargar
                </button>
            </form>
        </div>
    </div>

    <!-- PASO 3: Reportes de la sesión -->
    <div th:if="${reportes != null}" class="tabla-card">
        <div class="card-header-custom d-flex justify-content-between align-items-center">
            <span><i class="fas fa-file-alt me-2"></i> Reportes de la Sesión</span>
           <!--  <a th:href="@{/reporte/reportes/nuevo(idTutor=${idTutorSeleccionado},idSesion=${idSesionSeleccionada})}"
               class="btn-accion btn-generar">
                <i class="fas fa-plus"></i> Nuevo Reporte
            </a> -->
          <a th:href="@{/reporte/reportes/nuevo(idTutor=${idTutorSeleccionado},idSesion=${idSesionSeleccionada})}"
   th:if="${esCoordinador == null}"
   class="btn-accion btn-generar">
    <i class="fas fa-plus"></i> Nuevo Reporte
</a>
        </div>

        <!-- Sin reportes -->
        <div th:if="${reportes.isEmpty()}" class="p-4">
            <div class="empty-state">
                <i class="fas fa-file-circle-xmark"></i>
                <p>No hay reportes registrados para esta sesión</p>
            </div>
        </div>

        <!-- Tabla de reportes -->
        <div th:if="${!reportes.isEmpty()}" class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-calendar me-1"></i> Fecha Reporte</th>
                        <th class="text-center">Semana</th>
                        <th>Fecha Sesión</th>
                        <th>Observaciones</th>
                        <th>Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tmpReporte : ${reportes}">
                        <td th:text="${tmpReporte.idReporte}"></td>
                        <td th:text="${tmpReporte.fechaReporte}"></td>
                        <td class="text-center" th:text="${tmpReporte.sesion.semana}"></td>
                        <td th:text="${tmpReporte.sesion.fecha}"></td>
                        <td th:text="${tmpReporte.observaciones}"></td>
                        <td>
                           <div class="acciones">
                             <!--   <a th:href="@{/reporte/ver/{id}(id=${tmpReporte.idReporte})}"
                                   class="btn-accion btn-ver">
                                    <i class="fas fa-eye"></i> Ver
                                </a>
                                <a th:href="@{/reporte/editar/{id}(id=${tmpReporte.idReporte})}"
                                   class="btn-accion btn-editar">
                                    <i class="fas fa-edit"></i> Editar
                                </a>
                                <a th:href="@{/reporte/eliminar(id=${tmpReporte.idReporte})}"
                                   class="btn-accion btn-eliminar">
                                    <i class="fas fa-trash"></i> Eliminar
                                </a>-->
                                    <a th:href="@{/reporte/ver/{id}(id=${tmpReporte.idReporte})}"
   class="btn-accion btn-ver">
    <i class="fas fa-eye"></i> Ver
</a>
<a th:href="@{/reporte/editar/{id}(id=${tmpReporte.idReporte})}"
   th:if="${esCoordinador == null}"
   class="btn-accion btn-editar">
    <i class="fas fa-edit"></i> Editar
</a>
<a th:href="@{/reporte/eliminar(id=${tmpReporte.idReporte})}"
   th:if="${esCoordinador == null}"
   class="btn-accion btn-eliminar">
    <i class="fas fa-trash"></i> Eliminar
</a>
                             
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragmento/fragment :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

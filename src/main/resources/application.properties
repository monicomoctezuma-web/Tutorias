spring.application.name=tutorias

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/DepTutorias

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:DepTutorias}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:2004}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.upload.base=/app/uploads/
app.upload.dir.usuario=/app/uploads/usuario/
app.upload.dir.tutorado=/app/uploads/tutorado/
app.upload.dir.tutor=/app/uploads/tutor/

server.tomcat.max-swallow-size=-1

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB